version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/store/query.sql"
    schema: "internal/store/schema.sql"
    gen:
      go:
        package: "store"
        out: "internal/store"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        overrides:
          - db_type: pg_catalog.numeric
            go_type: float64
